name: Protect Main Merge

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  protect:
    runs-on: ubuntu-latest
    steps:
      - name: Only allow PRs from 'dev'
        run: |
          if [ "${{ github.head_ref }}" != "dev" ]; then
            echo "Only PRs from 'dev' branch are allowed."
            exit 1
          fi